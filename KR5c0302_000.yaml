front:
  text: 金碧五相類參同契序似五
  hash: sha256:5867e78ac61c8527e2521af52ecd0539448016dc2445105b8405491cce952783
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0302_HFL_000-001a, image: hfl/0588/0588-116.png}
body:
  text: 陰長生撰參者離也同者通也契者合也八十一章儻有學人欲傳於妙道修具之門户先聖所傳天地陰陽造化玄妙之機須化得三人同心志慕意性契合别無差互然後乃挂十方繒綵之衣靜身除亂思弟子掃五方之地可以方丈晝壇三層之中安香爐虛心焚香祝告三清四面卓刀八方懸鏡學人稱弟子手捧千兩黃金跪膝乃發弘願盟説誓言方可傳之仙經奧理存心志慕修養鉛汞龍虎之機但窮此門必達天仙之徑路若逢賊盜薄徒浮遊亂想之輩不可傳之此是仙機不可泄漏不擇人傳沈於永劫如遇好士孝父母重神明重天地重賢人信好事忘人方與度之亂傳者七祖受殃夫大道是天地之機陰陽之祖造化之本
  hash: sha256:ed1fcc512c18a9d1512d7760a5e74c6bb6f0dfc50a38230981fac4f2605a2a44
