front:
  text: 金碧五相類參同契卷中似六
  hash: sha256:72a586f1f6306442449097bac2b250c03854fb07579a2c7c6f1ac2bb2f77598c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0302_HFL_002-001a, image: hfl/0588/0588-142.png}
body:
  text: 陰長生注金津玉液章第七金津生坎户玉液産離宫金津者是精從坎宫子位而生坎者腎也玉液者是津從離宫午位而所産離者心也精津合歸中宫乃成金丹大藥謂之曰鉛汞二真也兩般俱是一分配為二儀鉛為津汞為精並因氣而成此至離宫而分配上下謂之陰陽造化本一物而分二體却以相合用氣而煉成金丹大藥結就五穀自除三尸自亡人乃長生延年百萬劫為天仙永不墮於凡世間也但於恍惚覓沓冥自有形恍恍惚惚其中有物是為虛中有實日中氣是杳杳冥冥其中有精是月中氣是陽精與陰交合為大藥有藥自有神神者息也一為水二為火火能生土土者生神亦曰一體陽精一體曰陰精空中有實相無中道自成道自成者謂之氣氣化為津津化為血血補於精精者神也神存體健若要存神但養氣道自得成若養氣不得存神之理故經云純陰不成道純陽不成丹一陰一陽是謂道修養之成也本因造化體陰陽變通榮氣者為陽精者為陰謂陰陽相感為正氣正氣者是人之根柢也正氣散而神不聚正氣聚而神自清方可得長生神氣為命是金木之宗為之造化方能變通榮其身悅其澤自得昌盛返老還童是以此法成真神仙也九還并七返乾坤是功程七返者寅至申謂之七返三陽三陰六數可象半年謂之正六也申至寅謂三陰三陽亦是六數可象半年謂曰七正也故為返是謂交夾脊而上至腦户却下玉泉謂之七返九還者陽六陰之數從已至亥亥却至巳用而行從尾閭穴返入金骨鎖中道而上入泥丸從泥丸而度重樓十二環中朝赤帝君流行下丹田朝黃元君後入金堂收入寶瓶藏一名神丹二名寶龜三名赫赤金丹四名三昧真火是功程之數為九轉現其九色之光九還也神水曾青章第八神水曾青分兩名上下通流各别行神水者是津在於口中舌下所在從左腎而逆上穿離宫過多為華池之漿故歌云神水華池世所希留傳不許世人知曾青者精在於橐籥所生從右腎而行逆上離宫却下出於玉泉又歌曰曾青有路入希夷留蹤只許志人知因一物分其二形謂之津精上下别行各道悟其津精之理便是鉛汞龍虎之情達恍惚得遂杳冥也神水本從丙丁出曽青生在壬癸情丙者南方生於巳屬陽丁者南方生於未屬陰夾其離離謂兩頭是陽中心是陰所生神水一名玉液二名鉛三名龍四名嬰兒五名金公六名太陽酥曾青生在壬癸壬生北方生於亥屬陽癸在北方生於丑屬陰夾其坎坎兩頭是陰中心是陽所生曾青一名金液二名汞三名虎四名姹女五名玉質六名法水此是陰陽造化壬癸通變故要識也有人自悟仙經埋便見還丹大藥成凡有修養道人自悟參同之理金丹大藥自然成須臾傳之口訣故經有歌云所言金木水火土留身保命是龍虎學人不認五行精强認他人為父母木主氣兮金作虎肉象土兮血為水不死之道在離宫會得五行真有主還丹須是水銀珠玉質那堪為伴侣但悟此言達神仙必與高尊為朋侣須向中宫尋鼎器八門相應計功程中宫鼎器是黃元君也八門者休生傷杜景死驚開謂之八門是日用八卦之應起在八留中宫使若運用功程下工夫也但用水火成既濟南宫仙簿注添名水火者津精氣息是也上有水下有火其丹鍊之而成不令差錯息數可至千日為神仙上方南宫列名簿於修學道人名姓注矣日精月華章第九日精與月華相合鍊成砂日精者木之氣月華者金之氣木謂之陽金謂之陰相合著方成濟命丹砂也知白守其黑名曰是河車陰者黑陽以白從陰而所産陽謂之鉛鉛者黑錫用火而鍊之內有白銀自現故曰知白守黑黑水數一白者金二之數也得一方生二謂之陰陽為日精月華名曰河車故經云北方正氣號河車東方甲乙成金華此之是也運行中宫內丹田生黃芽但將日精月華日用四時而運轉入於中宫之內中宫者謂之鼎器也日精為鉛名曰河車月華為汞名曰金華金華者謂之鉛黃華也中宫鼎者謂之曰土也鉛汞見土乃生其芽謂之曰黃芽是也穀氣消除盡自現美金華凡以修學之人悟其鉛汞下田真氣而生但自閉息存神養氣息閉千數五穀死氣自除人乃不飢不渴息住神存真氣而日日自生學人自然身輕體健力與常人加倍行如雲奔雨驟飢餐元和之氣渴飲玉液之漿華池之內常似菊華之香是天地之真和氣美金華也海中無穢質三蟲漸漸賒海者是人胃名曰水穀海其中盛於五穀之柤滓此名穢質凡修學人採鉛汞鍊可及千朝閉息養氣數至千息穀氣自然而除柤滓退盡三十日上蟲名彭居在丹田自以銷亡學人顔貌光澤返老遣童六十日中蟲彭質在丹田自以銷亡令人不飢不渴身輕體健肉潤肌香九十日下蟲彭矯在丹田自以消亡令人無疾返老還童三蟲死身作地行之仙頂中鶴舞足下生雲號曰真人三陽真神助也形超於金骨將身伴浮查凡修道人之志練鉛汞日用四時運轉三宫可及百日金丹而成閉息養氣如數至萬换骨成金骨形超如冰肌香肉膩入水不濡匿火不焚自入五假之中要去而乘空便往意到去處足霧而至矣謂伴浮查浮查者五假之仙是也大小數章第十從一至十分配年月經從一至百從百至千從千至萬萬生億億乃成兆兆轉至垓增之大小數小者一日十二時六時為陽乃從子至已也六時為陰乃從午至亥也一日一夜此名子午法子前是生氣午後是死氣不在行之子後午前是名生氣可以用功故歌曰子後午前須志鍊隨意出隨意入子細思量是寶物子後午前是運用玉液金精成仙藥之名陽大陰小之數也卯酉開爐浴參銖分兩停九九卯酉二時與二八日不得行功住火只以沐浴寅申巳亥下火每時用火一銖三參七忽七絲七杪不令火急須是慢慢加火之數火者是閉息養氣在神之數也但從九而添以漸加之至萬數金丹乃自然燒就見其嬰兒名曰十月懷胎子母分丹之成也銀表金作裏神室合子形銀表者是鉛金裏者是汞鉛為陽汞為陰陽為表陰為裏龍伏虎津裏精謂之日魂月魄日精月華嬰兒姹女玉夜金津故曰六陽爻六陰爻也相制名曰神室陰陽氣相結形如雞卵謂之合子形黃白也安在中宫鼎方用八卦行中宫者丹田也名曰鼎器陰陽二氣採鍊入中宫得土方可相合制為一也青黃白是其丹謂之命也卦體者是功程之候亦是陰陽斤兩卦象爻數是陰精陽精合成也說卦體章第十一乾生於坎是金精乾者天也屬金位應西北十五日回照庚方申一水合青氣也坎産艮時山石名坎生水謂陰中有陽從金而生坎十五日黑月白精水産於艮卦名山石也在位東北謂之曰生二十八日下弦之體木水山石中産震者木也卦名雷應之卯位為有百刻二十分四十杪亦有七十二度象一年十月之數謂十年者故謂之小也大者是十二月也六箇月為陽者是十一月至四月從子至巳也六箇月為陰者是五月至十月從午至亥也此是一年十二箇月之數故謂之大也此者是一年之月數之程是實數月也日時運為數但度陰陽情日者與時同光凡修學養性練命可用四時四時四孟也立春立夏立秋立冬謂之四時四孟者正月孟春四月孟夏七月孟秋十月孟冬此為四季之首時用寅申已亥此謂曰七返九還寅為木巳為火申為金亥為水此是四象納於中宫為之五行故謂曰九還寅為金巳為水申為木亥為火納於中宫翻配坎離故日七返故經云離宫有象藏真水坎户含花隱正金此謂之九還七返是陰陽之情凡修養悟此理是真正妙道無礙也六合與衝破神機互包成子丑寅亥巳申午未戌卯酉辰此為六合也子午卯酉巳亥寅申辰戌此為衝破六合俱運轉衝破用行功此是神機互包成象也大若因此是陰陽情理但依此必無差互也大時功九載小則百日名此句以在前句解大則功其九年二十七小名方三大功畢小者百日閉息功程立可金丹而成勝於九載之功此謂九載百日之名數九載者難成百日立而成也寅申并己亥子午轉金精寅申巳亥此謂四時日用功行子午名翻既濟以導引而般載從尾閭穴運行返上泥丸順轉歸於丹田中見真性金晶變轉成金丹令生二日之象是金之孫水之子從山而出謂之二陰一陽日月相望乃生為風體木春中日魂又日月精名曰龍周易九之數也巽為風體木而生巽者卦名曰風位應東南是以坎之女生之於木春能生萬物萌芽發和風而消凍謂之二陽一陰陽在上陰在下三日成華也離為朱雀藏於土離屬火謂陽中陰從震所産因風而成卦體謂朱砂中有水銀位應午地屬陰藏於土者謂有坤卦在西南六十日成紫精陰陽不測也兌出坤宫自合情兌者位應西方於酉自坤所生令應八月謂之日月相望月以增自後乃虧為二陰一陽陰在上陽在下九十日成紫金砂金砂者紫晶是亦精也子後復爻為初卦寅申交泰七返靈子者令應十一月日中應子時一陽初生在五陰之下行功程名曰地雷復卦五陰戰一陽謂之見龍在田返至寅為地天泰卦謂交泰三陰三陽又返至申為天地否卦亦為交泰應其秋三陽三陰謂之七返為否泰二卦相返之說也午後遘位來相應已亥乾坤九還成午者令應五月日中應午時一陰初生五陽之下功程行之後名號天風遘五陽戰一陰謂之初六履霜堅冰至巳者月應四月日應巳時謂之乾卦之體六陽爻俱數備足陽重一百九十二銖亥者月應十月日應亥時謂之坤卦之體六陰爻俱數足陰重一百九十二銖陽者銀半斤陰者金半斤金銀相合共重三百八十四銖謂之一十六兩是一斤之數金丹大藥九轉薳丹之名曰九還應之九色其九色見弦望而自然成備也艮投坤卦陽看盡運用陰陽九月程艮者山也位應東北一陽二陰坤者地也位應西南三陰艮投坤位卦名山地剝令應九月一陽戰五陰至十月建亥陰消陽盡已見其坤坤者見真土妙用之處謂之曰土也兌入乾宫陰欲絶卦分節令九三經兌者正西酉位乾者西北之位兌卦名澤乾卦曰天兌與乾俱是金一陰戰五陽令應三月卦謂之澤天夬陰消欲絶至四月建已乾卦成此謂之九還也是金丹大藥成寶號名紫金砂是也弦望章第十二上弦月初生庚位每月三日月出庚地謂之金精氣初生陰爻發重一十二銖是名月魄也下弦月喪在甲地每月二十八日月喪在甲地早以大陽而現之月喪甲者木也木精氣初生陽爻發一十二陰陽之氣所合是名日魂也日月相合陰陽氣共重一兩計二十四銖是謂陰陽之數是鉛生於木木為陽銀為表為夫汞生於金金為裏為婦合成四象金水八兩水火八兩共計十六兩大藥也日月相望匕八時二八陰陽爻相備日月每至十五日一望日月相見而生謂前十五日日有盈月有虧後十五日月有盈而日有昃前十五日者是二月後十五日者是八月謂之六陰六陽相備是陰重一百九十二銖陽重一百九十二銖共重三百八十四銖計一斤之數謂月一十六兩也是月上弦金八兩下弦銀八兩銀表金裏也月八與對二十三出沒俱在離宫位月八與二十三日月出月沒並在正南午地屬火卦應離謂兩頭是陽中心是陰按周書云離中虛謂火中有水每月八日與二十三日並生在離地月者是金之氣離中有真水與金是子母故現沒在離宫也陰陽分配金與銀大藥時見相契類陰者金也陽者銀也金是月銀是日謂日月契合銀為表金為裏汞將鉛而自住結成大藥者也但存神息鍊金丹存神者是氣息者是血氣為水血為水息有五數為上為金為水為木為火水是血血是髓髓是精精者便是神也人能存精是津津與精相合契類立養其命延得年益得壽丹田中有真氣者不久便是真人也九轉終時换天地三尸除滅身得昌九轉者精津相合是謂鉛汞自成鉛者外白內黑汞者外赤裏白鍊成真鉛紅變成緋鉛轉色黃黃鉛緋紅青合變成紫金名曰金砂是其大藥運轉中宫九合歸一是曰金丹除五穀百日之中三蟲自滅乃得身昌形超金骨體透光明紺髮童顏與仙同位乃是真人自然不寒不熱不飢是也三清自有天符至若人自識鉛汞煆煉得成金丹鎮在三宫日用八卦六時運轉天關不入地户不出此是無漏之田功成行滿三清仙曹貝姓簿內添名行滿八百寶遍三千上界遣朱衣童子自來迎取金碧五相類參同契卷中
