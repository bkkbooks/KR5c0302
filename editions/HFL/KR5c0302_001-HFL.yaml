front:
  text: 金白王碧五目相類參同契卷上
  hash: sha256:80298f8d7b75e1819448497597fb4291b1ae15184047b87bcd4ab75ac1bfe161
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0302_HFL_001-001a, image: hfl/0588/0588-118.png}
body:
  text: 陰長生註叙說章第一昔說魏君參同契參者離也同者通也與諸君子書丹經並此相通其機奥識認根元契者上合天仙之訣下合陰陽造化變轉謂之上契合也其中真話長生埋其經解仙機明恍恍惚惚冥冥杳杳五行眞正之奥旨謂之曰眞話長生之理也陰陽造化本根元陰陽者從黑生白是水之數一水之生金數之三水者謂之離生於坤坤爲地地爲陰陰爲女女爲母母從坤生其炁是謂坤也金在於西北屬乾爲天爲陽爲男爲父生於坎此是陰陽造化本根源故經云離宮有象藏真水坎尸含華隱正金及以乾生三男坤生三女通變爲八遞相生養共成八八之數爻象化而爲陰陽之大小數是足也莫問他人但問己凡以學道修眞並不離其身悟之仙聖其義玄以成眞是謂問己夫以學人不曉丹經子書多生迷亂不問自己却於外覓求真何日得達天經興道殊絶更求五金八石却燒煉大藥那能燒煉得成就也朱砂黑錫與雄黄罏内燒煉成二炁朱砂者非世上朱砂水銀非世人水銀黑錫者是磺中燒出之類是其眞鉛鉛中自有燒煉自有白銀聖人將朱砂黑錫入在鑪鼎之中用雄黃相制乃燒成二炁丹雄黃者非世間雄黃其藥出在武都山水化之中得此雄黃方可燒得大藥成就說朱砂者是南宫而産在丙丁之中黑錫者是北方而生在於壬癸之中雄黃者是中宫而長在戊己之内將此三件藥都在鼎中燒成二炁丹方乃成遂乃多生變化仙經云藥藥元無藥鼎鼎元無鼎爲復四象成爲復五行作藥及鼎不離於身莫向外求若向外求去仙遠也變轉白雪與黄芽芽下種之時須審意朱砂黑錫煅煉用雄黃制之丹名二炁丹丹用文武火燒先變爲白雪其藥在鼎中如鵝毛又如雪片顔色半紅白返被雄黄相制變成黃芽似田中下種得炁而生芽芽雄黃爲土土能生萬物萬物死歸土者是五數返爲一萬事畢也任從改换河車體七返還因翻既濟見其寅是其木認真中謂之金金能伐木爲之返在藏是肺與肝在外爲東西金者精木者津精津相成合爲丹砂精從離宮下而産津從坎宮上而生離坎二宫是爲水火既濟鼎河車者是北方正炁也轉入東宮甲地甲乙作金華是坎位轉於震位九轉結成紫金砂點化金銀富我家鉛汞與雄黃相合燒成大藥返兒乾坤陽重一百九十二銖共計重三百八十四銖爲一斤之數是金重八兩銀重八兩爲還丹號曰紫金砂陽爻一百九十二銖陰爻一百九十二銖共重三百八十四銖謂之遣丹大藥自然而燒就人得此丹是以金銀七寶遍滿我家鳥餐成鳳蛇餌爲龍人得食之長生不死在世遊行號曰地仙後八百行滿爲神仙也識藥根苗章第二學道先須辨其藥見苗方認根橐籥若人修身養命須知損益辨藥根苗黑白分明光潤鮮靜橐籥者謂之根蔕左爲橐右爲籥在人丹田之下有一橐内盛日月之根日夜輪轉四時週匝煉於三田此是三魂之要大藥金丹之源謂之茯苓安魂人參定魄非是凡間之草茯苓外黑内白人参外赤黃裏青白此是見藥之苗根也修養要識真根苗乃妙也取採要用二八真藥中自有真酥酪取採二八者謂之卯酉又十六之數謂之金木相剋上用於卯卯者是龍龍爲血下用於酉酉者是虎虎爲髓髓血相和謂之酥酪也酥酪者爲日月精魂學人得此物長生久視不死爲神仙度上南宫是日月生坎萬方成水火本基鉛汞之類是也文武火者四時功閉息納炁九一之數相制者是上採木火之津下是金水之精居入於中宫用土而合成大藥慢搗功數無差錯慢搗者是功程之數閉息納炁心暗數之每至九息一咽可以從九而常添至其百息日月用導引運動要採之是爲陰陽之造化日精月華之炁金精玉精九一而採之慢搗功數却行三一謂之文武火息者火也又曰爲真土也和合須藉玉液漿燒就丹砂光錯落玉液者華池之水又曰瓊漿亦名天酒凡以採取到藥制修用功慢搗後得玉液和之此是津精相投和合乃爲丹砂閉息存縮抽吸得土相合息炁爲火方乃燒之丹砂結成藥體自有神光容顔悅盛返老還童體健身輕行如奔馬力與常倍耳聰目明功滿德就足下紫霧籠身所在之處有三魂七魄五藏六腑神六丁六甲土地常隨定邪魔魍魎見之遠避不敢來侵近也鳥餐成鳳蛇餌龍金液還丹鉛汞作金液還丹結成朱雀自現爲鳯通者自然化爲賸蛇爲龍通適意之處遂乘雲龍而得跨鳳若有修道之人但須忘煉鉛汞造化改變無窮金丹結就火不能燒水不能溺且作地仙無障礙也用功章第三用功冬夏及春秋四時者是立春立夏立秋立冬此爲四時春七十二日夏七十二日秋七十二日冬七十二日是木火金水四象爲之四孟頭寅申爲金木是相刑相生金木體共三百八十八年之數少用四孟時冬用四五日是一百九十年爲大數功小者日用四時亦是一百九十數也計陰陽造化大小數是神明不測之功也已亥爲還八卦頭巳者火也謂之四月純陽之體卦應於乾是天亥者水也謂之十月是純陰之體卦應於坤是地天地相合六陰六陽俱備從子至巳半年之數初起地雷復卦爲頭六陽爻數足從午至亥半年之數起天風遘卦爲頭六陰爻數足金丹大藥見其九還是謂水火既濟水火相剋而制之根元得正體大藥成也日會甲庚與壬丙相尅相包四象求甲爲木位在東北月至二十八日此地而喪朋謂陽生陰滅庚爲金位在西南月至三日生於庚地此地而得朋謂陰生陽滅壬爲水水是陽生於日魂丙爲火是陰生於月魄月魄者金之炁是陽中陰日魂者是木之炁是陰中陽故陰陽造化生在坎離謂之相剋相包互相包藏之類壬生甲丙生庚此是四象求得入宫鼎金丹大藥方變成故經云木主青龍金作白虎日爲朱雀月爲玄武四象交㑹入於中宫長生不離於戊已土金木水火以成塵不知先得誰爲主世人不曉聖人言自用胸襟不師古更將錯路指迷人不覺身殂爲灰土勸人煉藥須真虎陽得陰兮自并互功成只藉九重城餌之千日身騰舉此爲之四象求壬丙甲庚是真金木水土火是的也水火翻易具鼎器河車運轉戊己留四象生於戊已戊己者爲尊四象得戊已而成若無戊己四象不成五行無主戊是土已是糞糞土而相合爲一德經曰天得一者清地得一者寧藥得一者成人得一者靈土爲萬物主萬物得土而生土生萬物萬物因土而死歸土也所謂金木水火來入中宫方歸鼎器鼎器者是丹藥體中髓也青龍白虎生南北禽制相伏鼎中遊青龍生坎户白虎産南宫青龍木之主爲鉛從北方壬中而生白虎金之主爲汞從南方丙丁而産汞生朱砂中外赤應陽内生水銀是陰鉛産於石中内外黑應陰煉岀白銀陰鉛者津也名曰玉液又曰華池水汞者精也名曰曾青又曰法水二物本一體至中元朝赤帝分配歸於上下上者鉛是陽下者汞是陰陰陽相合得黃婆方成大藥此是龍虎鼎中遊也金公自覓黃婆問要與玉女會綢繆金公名曰嬰兒玉女者名曰汞也鉛汞相合入中宫鼎内鼎者黃婆也謂之丹田名土從一生五五合於一謂之六十二合數也是日精月華日魂月魄銀表金裏之體也鉛汞章第四鉛汞並生時本體鉛汞並是下元命門之根爲橐籥中所産生於腎左腎主壬右腎主癸腎之二炁合爲一體是鉛汞本一體一象鉛一象汞上下飛分南北離宫坎户配相隨上下翻變與鉛汞汞者陽爲木亦名嬰兒又曰日魂又曰日精鉛者陰爲金亦名姹女故經云坎男離女爲夫婦水火爲大藥此者真男眞女真水真火真鉛眞汞要妙神用也矣金銀便是真宗的上下翻作兩般名金銀者是陰陽之正炁謂之上下兩弦每月初三日月現於庚二十八日現於甲八日與二十三日各現於離宫位又曰顯陰陽變轉造化成形前十五日而圓後十五日而缺此謂二八之基陰陽數爻俱備餘日並有增虧盈昃謂之子午日分陰陽之足數經云日月魂魄因生坎離是金木之炁水火而成感胞胎養還丹以變色動容成爲四神丹四轉之藥也陰陽翻變轉九域坎户離宫顯變通採陰陽之正炁存精津而成要用七八之數可用寅申巳亥四時下火煆燒鉛無飛汞不走但中宫鼎内安排可變成白馬牙然用刀圭自然玉液號黃芽丹砂得成七返用寅爲頭卦應地天泰三陰三陽交薳謂之内應其肝外象於木寅爲四孟謂其長震是其中可用寅無用卯申者卦應天地否謂之陰陽否極泰來泰極否至交泰隨時三陽三陰返覆而生内應其肺外應其西方金西位申爲金亦屬於孟兌是仲可用申而毋令用酉龍不伏虎自走寅申爲七返靈砂三變轉還爲之九域者變轉之門從黑生白黃赤緋緑碧紅紫變轉九色謂之九遣號爲九域從心腎翻成謂曰離宫坎户屬陰腎是陽故曰陰陽翻變是也日月魂魄仙人惜會煉三田依寶珍刀圭自要仙人喫日魂月魄是精與炁往來於三宫是陰陽之真炁仙人惜此是人根柢以故惜也會煉三田者是炁往來於三宫之内煉三尸而自亡滅却遣丹而作紫金方圓徑寸可重一斤謂陰陽正炁結成真金謂之眞刀圭者是中鼎器謂之刀圭也亦曰黃芽有香味若菊花而黃色眞人地仙俱所好喫用故曰刀圭刀赤圭白日魂月魄章第五日魂月魄出坎離日月魂魄陰陽之炁結日魂木炁從坎户而上應其鉛爲之玉液在華蓋之上在竅中所出日魂月魄從三宫而産是炁下應其汞爲之金津四時上下來住交感不離三田下歸下丹田尾閭穴有三穴從右穴而上行變爲流珠上入泥丸炁於骨髓化爲金骨髓變爲流珠也甲會庚時神機變也還丹壬丙入希夷丙是火壬是水水爲既濟鼎中大藥已成故曰希夷希夷者謂之五行之根從土而生化通九轉亦從土結謂曰遣丹甲是木庚是金金木相刑乃成真土金木者藥之本也人之悟也悟其聖理勤行修於鉛汞自合神機復爻遘體是兩機原缺金碧五相類参同契卷上
