front:
  text: 金碧五相類參同契卷下似七
  hash: sha256:e534cc5ca3880dc7c9c725de0250b78d73afd4f3eee223962f473c66035c6307
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0302_HFL_003-001a, image: hfl/0589/0589-006.png}
body:
  text: 陰長生註七寶章第十三七寶本從一炁生神符白雪自甲庚七寳謂七返之炁名而自丹田之中真炁所生甲者木也庚者金也金木相刑寅至申而爲庚度甲返東而成返寅是甲之宗申是庚之祖甲謂之日精木之炁庚謂之月華金之炁金木相刑初爲神符白雪精津相合在鼎中如同雲母又如雪冰謂之曰神符白雪金液大還丹此是上品靈妙之丹也丙壬交會變二炁丙者火也壬者水也丙屬心謂之離壬屬腎謂之坎水火相剋成既濟坎者鉛離汞坎鉛中鍊出白銀離汞返成朱兒朱兒與白鉛相合燒成二炁赤丹砂也甲中馬牙似笋生將二炁丹砂運入丹田煆煉乃變爲白馬牙有似初嫩笋之芽又如草有白芽而生土號曰白馬牙也金木相交歸於鼎水火相調入雄坑金者水也汞也爲陰木者火也鉛也爲陽金者精也木者津也四象調服運入中宫謂之曰鼎定息閉炁存神於中宫鼎内鼎者土也謂之曰雄坑其藥號四神又曰四轉靈丹是矣五行成合能通變玉液丹砂七轉并五行者水木火金土是也其藥變爲黃芽次變爲玉液丹砂可七十二日爲七十二年之期是也寅申用意勤火候但存白黑返金精寅者木申者金木爲陽是鉛汞相合寅時與申時巳時與亥時下功謂之曰煅鍊勤行火候運養金精必益年延命也日月四時與八卦金丹大藥變童嬰日用者一日爲一年月用四時是寅申巳亥寅爲孟春亥爲孟冬申爲孟秋巳爲孟夏此是四時象一年之數八卦者乾坤離坎否泰復薳此是運用八卦一百二十日大藥成數者一千二百年三蟲自死穀炁消盡五藏真炁自成永絶諸味不飲不渴返老還童身輕耳明舉歩如飛行似雲奔雨驟力倍加常爲仙矣九轉章第十四九轉靈丹號曰金仙經義奧理幽深要識身中真大藥須藉陰陽二炁成謂之紫金丹砂仙經萬卷子書萬章盡言鉛汞學人不曉義理却將黑錫水銀用鼎器而燒不曾有達人悟其義理大藥不離人身中自有也是名紫金丹若餐一粒延年千載鬼神自怕凡修學人悟於鉛汞之理識認陰陽根祖煆煉成丹延年益算萬病皆除三蟲既滅神鬼見之自懼也散爲流珠千萬顆聚時方始作真人鉛汞鍊就成珠亦呼舍利仙人曰流珠此是七寶聚時陰陽二炁合爲一粒是眞金方寸可重一斤計一十六兩陰重一百九十二錬銖陽重一百九十二銖爲金木木者汞金者鉛汞爲虎鉛爲龍龍虎相伏自成大藥真人鉛者是真炁真炁者謂曰嬰兒嬰兒自守寶藏矣陰爻陽爻共和會造化機關自合神陰坤卦陽乾卦坤者地乾者天天炁降地炁騰乃以陰陽相感相合和用謂之曰造化是名神通又曰造化神通難測量也除三蟲章第十五三蟲後來有姓名三蟲者三尸也上蟲姓彭名居在上丹田中蟲姓彭名質在中丹田下蟲姓彭名矯在下丹田在人身爲三魂亦名曰三尸嗜酒食肉好鬥争貪財貪色好人夭上尸好食酒肉喜怒中尸好貪財好鬥下尸好色只好死不好生每至庚申日上界奏司命報其人惡不奏人善要人早亡待食人血髓故以學人先須除三蟲方免苦也所生於志妙道難學若遇志賢達士求取妙理修行若負志人天降罪也除盡三蟲壽延齡穀炁絶時蟲自滅人要修養先守庚申除其三蟲方可煆煉精津合大藥鉛汞相制不飛而伏龍虎相降五臟真炁成下元生沖和之炁閉息至一百二十息日漸除於穀炁三十日上蟲自死六十日中蟲自死九十日下蟲自亡三蟲既亡人之延年益壽永不飢渴也坦然無慮養金精人之絶除五穀不貪諸味金精自住不泄此是大藥之宗人性命之祖經云生者死之根死者生之根是也生死二根識者少矣有生能死死能生鉛汞成丹活得人若離五行應不道未達玄旨卒難除是金精變大藥也金精者汞王液者鉛汞者金鉛者木木爲陽金爲陰是青與白到於丹田中者土土者黃謂曰青黃白是金丹大藥聚即方寸成紫金丹散時或流珠謂之珠寶三田日目鍊真行之九十日三蟲自死自絶五穀閉千息可於水下行之水不能溺也三宫之内自有日月鍊形體透明光永不思世事自鍊真精矣九域章第十六名號九域須知訣變轉神炁盈髓血九域者是九運之鏡亦曰九轉之門户一名谷神二名乾關三名華池户四名飛門五名魂窗六名天户七名海漏八名希夷門九名日域謂之九域有九運之色並是從此門而入學人得口訣方乃閉息養炁閉息乃通遍於身也炁血相逐入於骨内自變成髓髓滿之時延年益壽長生不死也添精補髓益筋皮夜化遍身白乳徹炁化爲血血變成精精而不泄補髓運入泥丸爲腦髓也使得人之肉潤肌白如玉光滑筋力與常人加於萬倍謂食之百日通行真炁遍通流白乳無其赤血名牓仙位住世長年作真人是曰地仙也三蟲自滅道體昌具炁通流無休息三蟲既死身乃昌穀炁自除五藏盈真炁轉遍於身息以自住可閉至萬息入水不濡入火不能燒曰仙人矣天關鏁兮地户閉中宫嬰兒翫日月天關鏁了者上下入諸味不得及穀炁息自閉住也地户牢者下無漏兩户俱閉中宫者丹田也名曰鼎器鉛汞運入鼎中是真炁名嬰兒翫日月者是陰陽之正炁也百年鍊就一真人三清添名玉皇悅百年者是百日成也一日有十二時六時陽六時陰亦以寅申巳亥謂四孟謂之四時鍊就金丹名曰一真人功成上界爲除却三尸自有三清觀見此人有霞炁現仙簿添名謂之玉皇顔悅也嬰兒姹女章第十七三宫之内嬰兒現三宫者三丹田也嬰兒者謂之三元正炁也亦名曰鉛又曰木之正炁號曰木精也明堂前面有玉池明堂者橐籥也又曰精海謂之曰明堂亦名洞房是也黄婆打合婚姹女姹女者是名汞又名金之炁謂之月華黃婆者土名號鼎是中宫之炁鉛汞見土方乃合爲一處二一歸鼎合和成丹矣同於地内不分離嬰兒爲鉛姹女爲汞鉛汞相合鉛表金裏謂之真陽真陰被中宫鼎内合歸於一處此是不分離爲其大藥之宗祖也朝暮翫看日月珠夜夜相伴入翠幃朝者白日也暮者夜也翫看者精聚謂結成珠也名曰流珠曰月者金木之正炁於丹田之内别有日月日者陽之炁月者陰之炁謂之日月魂魄也夜夜伴入翠幃是謂金木相制名之曰入翠幃是大藥成二炁金丹也結就綢繆眞胎脫結就綢繆是大藥根祖成生黃芽白雪謂綢繆也眞修養之人功成丹田正炁凝結容顏改變返老遣童是名胎脫也十月終滿是程期三十四炁安排定但以人之修養十箇月三百日自成金丹大藥有六十日爲卯酉之日二八相望是沐浴一年之數十二月内除二月八月只用十箇月功至大藥有二十四名應於二十四炁一年之節全是也頂門產一丈夫兒學士之人心中修養丹田元和正炁結就鍊成金丹大藥眞陰陽炁相合每運用存想眞炁自於頂門而出乃曰嬰兒號曰真人於頂門遊行是也彩眞玉霞岀現章第十八存神養炁彩靈機萬化身中改度移存神者精不泄而神存精泄而神去但以修身養命勿泄於精謂之神人在炁中長存形枝不枯朽若以人之多泄金精出於玉泉人形以顦顇身多尫羸旦夕必爲下鬼若人不泄金精更用津合和自現靈機身超凡俗入其聖道萬般造化自有改變形神但有瘢痕黑靨記悉皆改移陰司除死簿上界注仙名也息能自閉經千數五行真炁鎮相隨凡學道修身養命休糧絶食有一百一門並無成者只可治病而但養下元眞炁不泄於精上不出於息可返千息自作神仙五藏真炁於頂門而生神岀現也黙念具一精心志眉間現出玉霞圍默念眞一凡以晝夜存念之審願爲道神仙不死先去三尸心下伏尸蟲自去三百六十息食炁二十通一休息日四時爲之常以夜半與雞嗚呪曰東方青牙飲朝華三咽止南方朱丹朝食朱丹飲丹池三咽止中央之野仰望泰山服食元炁飲醴泉三咽止西方明石服食飲靈液三咽止北方玄滋服食玄流飲玉𥹋三咽止如此三十日三蟲皆死尸走去神炁自定也常以存念自有白炁於眉間現出圍繞於身謂之玉霞神炁電光飛是也矣項背九暈乘紫霧三清降籙授旌旗修身養命有金骨血變白乳形透光明後有九彩之暈足生祥雲紫霧紅霞天降眞籙前有龍旛後有虎旗意去之處刹那便到此神功成矣功成行滿朝天去龜鶴仙童迎有期修道人修身養命丹田中有眞陰眞陽二炁相合成紫金丹是日月之魂魄晶華相凝散爲流珠謂之功成行滿鸞鳳白鶴仙童賫天符至乘鸞跨白鶴歸天自有簫韶同歸紫府爲眞仙也此文是禁誡之書勿傳賤道之人輕泄天機及輕慢仙書者殃及九族沈滅七祖祕之寶之文狀不載眞訣口傳於學人自有不漏法祕之也金碧五相類参同契卷下
